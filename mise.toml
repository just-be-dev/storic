[tools]
bun = "1.3.10"

[settings]
experimental = true
pin = true

[hooks]
postinstall = "bun install"

[env]
_.path = "node_modules/.bin"

[tasks.build]
description = "Build all packages"
run = "tsgo"

[tasks."build:core"]
description = "Build @storic/core"
run = "tsgo --filter core"

[tasks."build:cloudflare"]
description = "Build @storic/cloudflare"
run = "tsgo --filter cloudflare"

[tasks.check]
description = "Check all packages"
alias = "type-check"
run = "tsgo -b"

[tasks."check:core"]
description = "Check @storic/core"
run = "tsgo -b --filter core"

[tasks."check:cloudflare"]
description = "Check @storic/cloudflare"
run = "tsgo -b --filter cloudflare"

[tasks.test]
description = "Run tests"
run = "bun test"

[tasks."test:core"]
description = "Test @storic/core"
run = "bun test packages/core"

[tasks."test:cloudflare"]
description = "Test @storic/cloudflare"
run = "bun test packages/cloudflare"

[tasks.example]
description = "Run the example"
run = "bun examples/schema-versioning-with-lenses.ts"

[tasks.lint]
description = "Lint all packages"
run = "oxlint"

[tasks.fmt]
description = "Format all packages"
run = "oxfmt ."

[tasks."fmt:check"]
description = "Check formatting"
run = "oxfmt --check ."

[tasks.publish]
description = "Publish packages to npm"
run = "bun publish"
