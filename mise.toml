[tools]
bun = "1.3.10"

[settings]
experimental = true
pin = true

[hooks]
postinstall = "bun install"

[env]
_.path = "node_modules/.bin"

[tasks.build]
description = "Build the project"
run = "tsgo"

[tasks.typecheck]
alias = "type-check"
run = "tsgo -b --noEmit"

[tasks.test]
description = "Run tests"
run = "bun test"

[tasks.example]
description = "Run the example"
run = "bun examples/schema-versioning-with-lenses.ts"
