[tools]
bun = "1.3.10"
lefthook = "2.1.4"
node = "24.13.0"
op = "2.32.1"

[settings]
experimental = true
pin = true

[hooks]
postinstall = ["bun install", "lefthook install"]

[env]
_.path = "node_modules/.bin"

[tasks.clean]
description = "Remove dist and tsbuildinfo files"
run = "rm -rf packages/*/dist packages/*/*.tsbuildinfo"

[tasks.build]
description = "Build all packages"
depends = ["clean"]
run = "tsgo --build --force"

[tasks."build:core"]
description = "Build @storic/core"
run = "tsgo --filter core"

[tasks."build:cloudflare"]
description = "Build @storic/cloudflare"
run = "tsgo --filter cloudflare"

[tasks.check]
description = "Check all packages"
alias = "type-check"
run = "tsgo -b"

[tasks."check:core"]
description = "Check @storic/core"
run = "tsgo -b --filter core"

[tasks."check:cloudflare"]
description = "Check @storic/cloudflare"
run = "tsgo -b --filter cloudflare"

[tasks.test]
description = "Run tests"
run = "bun test"

[tasks."test:core"]
description = "Test @storic/core"
run = "bun test packages/core"

[tasks."test:automerge"]
description = "Test @storic/automerge"
run = "bun test packages/automerge"

[tasks."test:cloudflare"]
description = "Test @storic/cloudflare"
run = "bun test packages/cloudflare"

[tasks.example]
description = "Run the schema-versioning example"
run = "bun examples/schema-versioning-with-lenses.ts"

[tasks."example:automerge"]
description = "Run the automerge CRDT sync example"
run = "bun examples/automerge-crdt-sync.ts"

[tasks.lint]
description = "Lint all packages"
run = "oxlint"

[tasks.fmt]
description = "Format all packages"
run = "oxfmt ."

[tasks."fmt:check"]
description = "Check formatting"
run = "oxfmt --check ."

[tasks.publish]
description = "Publish packages to npm"
run = "bun publish"

[tasks."changelog:entry"]
run = "bun scripts/changelog-entry.ts"
description = "Generate changelog entry for a PR"

[tasks."changelog:assemble"]
run = "bun scripts/assemble-changelog.ts"
description = "Assemble changelog fragments into CHANGELOG.md"

[tasks."release-notes"]
run = "bun scripts/release-notes.ts"
description = "Preview release notes for a package version"
