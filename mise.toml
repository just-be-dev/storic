[tools]
bun = "1.3.10"

[settings]
experimental = true
pin = true

[hooks]
postinstall = "bun install"

[env]
_.path = "node_modules/.bin"

[tasks.build]
description = "Build the project"
run = "tsc"

[tasks.example]
description = "Run the example"
run = "node --experimental-sqlite dist/example.js"
