name: Publish NPM Packages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      id-token: write # Required for OIDC
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4
        with:
          experimental: true

      - name: Build
        run: mise run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish @storic/core
        id: publish-core
        continue-on-error: true
        run: bun scripts/publish-package.ts core
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @storic/sql
        id: publish-sql
        continue-on-error: true
        run: bun scripts/publish-package.ts sql
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @storic/cloudflare
        id: publish-cloudflare
        continue-on-error: true
        run: bun scripts/publish-package.ts cloudflare
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @storic/automerge
        id: publish-automerge
        continue-on-error: true
        run: bun scripts/publish-package.ts automerge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @storic/tinybase
        id: publish-tinybase
        continue-on-error: true
        run: bun scripts/publish-package.ts tinybase
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
